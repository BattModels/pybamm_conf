<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.data.site.title }}</title>
<meta name="description" content="{{ page.description | default: site.data.site.description }}" />
<link rel="icon" type="image/x-icon" href="{{ '/assets/img/favicon.ico' | relative_url }}" />
<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}" />
{% if site.google_analytics_id and site.google_analytics_id != "" %}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics_id }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ site.google_analytics_id }}');
  </script>
{% endif %}
